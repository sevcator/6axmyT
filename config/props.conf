# Cloak — faked system properties (per-target-process, via libc PLT hook).
# key = value. Blank lines and '#' comments ignored.
#
# DISABLED BY DEFAULT. Property faking here only reaches libs that are already
# mapped when the app starts; an app's own late-loaded native library reads the
# real values, which can create a *cross-source drift* that dedicated
# property/coherence detectors flag. Root-hiding does NOT need this. Enable
# entries only for apps that do simple, single-path property checks.

# ro.debuggable = 0
# ro.secure = 1
# ro.boot.verifiedbootstate = green
# ro.boot.flash.locked = 1
