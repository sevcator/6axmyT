name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"                       # e.g. v1.0
            n="${VER#v}"; IFS='.' read -r a b c <<< "$n"
            VCODE=$(( ${a:-0} * 10000 + ${b:-0} * 100 + ${c:-0} ))
          else
            VER="$(grep '^version=' module/module.prop | cut -d= -f2)"
            VCODE="$(grep '^versionCode=' module/module.prop | cut -d= -f2)"
          fi
          echo "VER=$VER"     >> "$GITHUB_ENV"
          echo "VCODE=$VCODE" >> "$GITHUB_ENV"
          echo "Resolved version: $VER ($VCODE)"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build DEX hook
        run: |
          set -euo pipefail
          ANDROID_JAR="$ANDROID_SDK_ROOT/platforms/android-34/android.jar"
          # Fall back if android-34 not present
          [ -f "$ANDROID_JAR" ] || ANDROID_JAR=$(find "$ANDROID_SDK_ROOT/platforms" -name android.jar | sort | tail -1)
          mkdir -p module/java/build/classes
          javac -source 17 -target 17 -cp "$ANDROID_JAR" \
                -d module/java/build/classes \
                module/java/src/EntryPoint.java
          java -cp "$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/lib/d8.jar" \
               com.android.tools.r8.D8 --min-api 29 --lib "$ANDROID_JAR" \
               --output module/java/build \
               $(find module/java/build/classes -name '*.class')
          cp module/java/build/classes.dex module/classes.dex
          echo "DEX built: $(wc -c < module/classes.dex) bytes"

      - name: Build native + package
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          CLANG="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++"
          SRC="module/native"

          # Pinned upstream Zygisk API header (ABI contract). Update deliberately.
          curl -fsSL "https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp" -o "$SRC/zygisk.hpp"

          declare -A T=(
            [arm64-v8a]=aarch64-linux-android26
            [armeabi-v7a]=armv7a-linux-androideabi26
            [x86]=i686-linux-android26
            [x86_64]=x86_64-linux-android26
          )
          mkdir -p stage/zygisk
          for abi in "${!T[@]}"; do
            "$CLANG" --target="${T[$abi]}" -std=c++17 -O2 -fPIC -fvisibility=hidden \
              -ffunction-sections -fdata-sections -shared -Wl,--gc-sections \
              -I "$SRC" "$SRC/main.cpp" "$SRC/config.cpp" "$SRC/hooks.cpp" "$SRC/spoof.cpp" \
              -static-libstdc++ -llog -o "stage/zygisk/$abi.so"
            echo "built $abi"
          done

          cp module/module.prop module/customize.sh module/uninstall.sh \
             module/service.sh module/action.sh module/system.prop \
             module/post-fs-data.sh module/manager.sh module/modules.conf \
             module/sepolicy.rule module/classes.dex \
             module/targets.conf module/props.conf module/pif.conf stage/
          sed -i "s/^version=.*/version=$VER/"           stage/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" stage/module.prop
          ( cd stage && zip -r9 "../6axmyT-$VER.zip" . )
          ls -la 6axmyT-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 6axmyT
          path: 6axmyT-*.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 6axmyT-*.zip

      # Keep module/update.json (and module.prop) on main pointing at the latest
      # release, so the module's in-app updater always sees the newest version.
      - name: Publish update.json to main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git switch main
          sed -i "s/^version=.*/version=$VER/"           module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" module/module.prop
          cat > module/update.json <<EOF
          {
            "version": "$VER",
            "versionCode": $VCODE,
            "zipUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/download/$VER/6axmyT-$VER.zip",
            "changelog": "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/README.md"
          }
          EOF
          git add module/module.prop module/update.json
          git commit -m "release $VER: sync module.prop + update.json [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push origin main
